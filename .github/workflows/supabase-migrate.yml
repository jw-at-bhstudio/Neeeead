name: Supabase Migrate

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Migration target environment"
        required: true
        type: choice
        options:
          - staging
          - prod

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Resolve Database URL
        id: resolve_db
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.target }}" == "staging" ]]; then
            echo "database_url=${{ secrets.SUPABASE_STAGING_DB_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "database_url=${{ secrets.SUPABASE_PROD_DB_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ steps.resolve_db.outputs.database_url }}
        run: npm run db:migrate

